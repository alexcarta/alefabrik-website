<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ale Fabrik</title>
  <link rel="canonical" href="https://www.alefabrik.com/">
  <meta name="robots" content="noindex">
  <style>body{margin:0;background:#f5f0e8;}</style>
</head>
<body>
<script>
(function() {
  var saved = localStorage.getItem('alefabrik_lang');
  if (saved === 'it') { location.replace('it/index.html'); return; }
  if (saved === 'de') { location.replace('de/index.html'); return; }
  if (saved === 'en') { location.replace('en/index.html'); return; }

  fetch('https://ipapi.co/json/')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var country = (d.country_code || '').toUpperCase();
      var lang = country === 'IT' ? 'it' : country === 'DE' ? 'de' : 'en';
      localStorage.setItem('alefabrik_lang', lang);
      location.replace(lang + '/index.html');
    })
    .catch(function() {
      location.replace('en/index.html');
    });
})();
</script>
</body>
</html>
